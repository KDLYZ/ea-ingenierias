<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EA Ingenierías — Gestión Tributaria</title>
  <meta name="description" content="Sistema de gestión tributaria para EA Ingenierías">
  <meta name="theme-color" content="#0E0F12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EA Ing.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230E0F12'/><text x='50' y='68' font-family='sans-serif' font-size='48' font-weight='700' text-anchor='middle' fill='white'>E</text><text x='72' y='68' font-family='sans-serif' font-size='48' font-weight='700' text-anchor='middle' fill='%231E90FF'>A</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg:       #0E0F12;
      --bg2:      #14151A;
      --bg3:      #1A1C23;
      --bg4:      #20222C;
      --border:   #252730;
      --border2:  #2E3040;
      --blue:     #1E90FF;
      --blue2:    #0070E0;
      --blue-dim: rgba(30,144,255,.12);
      --blue-glow:rgba(30,144,255,.25);
      --text:     #E8EBF2;
      --text2:    #7A80A0;
      --text3:    #444860;
      --green:    #22C55E;
      --green-dim:rgba(34,197,94,.12);
      --amber:    #F59E0B;
      --amber-dim:rgba(245,158,11,.12);
    }
    /* ── LIGHT MODE ── */
    body.light {
      --bg:       #F4F5F7;
      --bg2:      #FFFFFF;
      --bg3:      #F8F9FB;
      --bg4:      #EDEEF2;
      --border:   #E2E4EA;
      --border2:  #C8CBD6;
      --blue:     #1270D4;
      --blue2:    #0A58B2;
      --blue-dim: rgba(18,112,212,.1);
      --blue-glow:rgba(18,112,212,.2);
      --text:     #181A22;
      --text2:    #4A5068;
      --text3:    #8E94AC;
      --green:    #16A34A;
      --green-dim:rgba(22,163,74,.1);
      --amber:    #B45309;
      --amber-dim:rgba(180,83,9,.1);
      --red:      #DC2626;
      --red-dim:  rgba(220,38,38,.1);
    }
    :root {
      --red:      #EF4444;
      --red-dim:  rgba(239,68,68,.12);
      --sidebar:  220px;
      --radius:   8px;
      --radius-lg:12px;
    }
    /* Toggle button */
    .theme-toggle {
      width:36px; height:20px;
      background: var(--border2);
      border-radius: 20px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background .3s;
      flex-shrink: 0;
    }
    .theme-toggle::after {
      content:'';
      position:absolute;
      top:3px; left:3px;
      width:14px; height:14px;
      border-radius:50%;
      background:#fff;
      transition: transform .3s;
    }
    body.light .theme-toggle { background: var(--blue); }
    body.light .theme-toggle::after { transform: translateX(16px); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── LAYOUT ── */
    #app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar);
      min-height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 1.25rem 1.1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-badge {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg4);
      border: 1px solid var(--border2);
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: -1px;
    }
    .logo-E { color: #E8EBF2; }
    .logo-A { color: var(--blue); }
    .logo-text { font-size: 12px; font-weight: 500; color: var(--text2); line-height: 1.3; }
    .logo-sub  { font-size: 10px; color: var(--text3); margin-top: 1px; }

    .sidebar-section { padding: .5rem .75rem; margin-top: .25rem; }
    .sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; padding: .4rem .5rem .3rem; }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text2);
      font-size: 12.5px;
      font-weight: 400;
      transition: all .15s;
      border: 1px solid transparent;
      margin-bottom: 1px;
    }
    .nav-item:hover { color: var(--text); background: var(--bg3); }
    .nav-item.active {
      color: var(--blue);
      background: var(--blue-dim);
      border-color: rgba(30,144,255,.2);
      font-weight: 500;
    }
    .nav-item i { font-size: 15px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--blue-dim);
      color: var(--blue);
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
    }

    .sidebar-bottom {
      margin-top: auto;
      padding: .85rem .75rem;
      border-top: 1px solid var(--border);
    }
    .user-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s;
    }
    .user-row:hover { background: var(--bg3); }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--blue-dim);
      border: 1px solid rgba(30,144,255,.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--blue);
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .user-role { font-size: 10px; color: var(--text3); }
    .logout-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 15px;
      padding: 2px;
      transition: color .15s;
    }
    .logout-btn:hover { color: var(--red); }

    /* ── MAIN CONTENT ── */
    .main {
      margin-left: var(--sidebar);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      height: 52px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .breadcrumb { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
    .breadcrumb span { color: var(--text2); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .page-title { font-size: 15px; font-weight: 600; color: var(--text); }

    .content { padding: 1.5rem; }

    /* ── BUTTONS ── */
    .btn {
      padding: 7px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: var(--bg3);
      font-size: 12px;
      cursor: pointer;
      color: var(--text2);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }
    .btn:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
    .btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      font-weight: 500;
    }
    .btn.primary:hover { background: var(--blue2); border-color: var(--blue2); }
    .btn.sm { padding: 4px 9px; font-size: 11px; }
    .btn.ghost { background: transparent; border-color: transparent; }
    .btn.ghost:hover { background: var(--bg3); }
    .btn.danger { color: var(--red); }
    .btn.danger:hover { background: var(--red-dim); border-color: rgba(239,68,68,.2); }

    /* ── METRICS ── */
    .metrics { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .metric {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.1rem;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .metric:hover { border-color: var(--border2); }
    .metric::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent-color, var(--border2));
    }
    .metric.accent-blue::before  { background: var(--blue); }
    .metric.accent-green::before { background: var(--blue); }
    .metric.accent-amber::before { background: var(--blue); }
    .metric.accent-red::before   { background: var(--blue); }
    .mlabel { font-size: 10.5px; color: var(--text3); margin-bottom: 6px; font-weight: 500; letter-spacing: .02em; }
    .mval { font-size: 21px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; letter-spacing: -.5px; }
    .mval.blue  { color: var(--text); }
    .mval.green { color: var(--text); }
    .mval.amber { color: var(--text); }
    .mval.red   { color: var(--text); }
    .msub { font-size: 10px; color: var(--text3); margin-top: 4px; }

    /* ── CARDS ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem;
      margin-bottom: .9rem;
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .card-title { font-size: 12.5px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 7px; letter-spacing: .01em; }
    .card-title i { color: var(--blue); font-size: 15px; }

    /* ── SEMAFORO ── */
    .semaforo { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .sem {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sem-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--blue);
      opacity: 0.7;
    }
    .sem-dot.verde   { background: var(--blue); opacity: 1; }
    .sem-dot.amarillo{ background: var(--text3); opacity: 1; }
    .sem-dot.rojo    { background: var(--border2); opacity: 1; }
    .sem-info { flex: 1; min-width: 0; }
    .sem-label { font-size: 10.5px; color: var(--text3); margin-bottom: 3px; }
    .sem-val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -.5px; color: var(--text); }
    .sem-val.verde   { color: var(--text); }
    .sem-val.amarillo{ color: var(--text2); }
    .sem-val.rojo    { color: var(--text2); }
    .sem-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* ── ALERTS ── */
    .alert {
      border-radius: var(--radius);
      padding: 9px 13px;
      margin-bottom: .75rem;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert.warn { background: rgba(255,255,255,.04); border: 1px solid var(--border2); color: var(--text2); }
    .alert.err  { background: rgba(255,255,255,.04); border: 1px solid var(--border2); color: var(--text2); }
    .alert.ok   { background: rgba(255,255,255,.04); border: 1px solid var(--border2); color: var(--text2); }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    th {
      text-align: left;
      padding: 7px 10px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
      transition: color .1s;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { color: var(--text); background: rgba(255,255,255,.02); }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 500;
      white-space: nowrap;
      border: none;
      cursor: default;
      font-family: 'DM Sans', sans-serif;
    }
    .b-em    { background: var(--blue-dim);  color: var(--blue); border: 1px solid rgba(30,144,255,.2); }
    .b-rec   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
    .b-pend  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,.2); }
    .b-pag   { background: rgba(255,255,255,.04); color: var(--text3); border: 1px solid var(--border); }
    .b-venc  { background: var(--red-dim);   color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .b-activo  { background: var(--green-dim); color: var(--green); }
    .b-inactivo{ background: rgba(255,255,255,.04); color: var(--text3); }

    /* ── FILTERS ── */
    .filters { display: flex; gap: 6px; margin-bottom: .9rem; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg3);
      color: var(--text);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .15s;
    }
    .filters input:focus, .filters select:focus { outline: none; border-color: var(--blue); }
    .filters input { flex: 1; min-width: 130px; }
    .filters input::placeholder { color: var(--text3); }
    .filters select option { background: var(--bg3); }

    /* ── FORM ── */
    .fg { margin-bottom: .8rem; }
    .fg label { display: block; font-size: 10.5px; color: var(--text3); margin-bottom: 4px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
    .fg input, .fg select, .fg textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg3);
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .15s, box-shadow .15s;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-dim);
    }
    .fg textarea { resize: vertical; min-height: 56px; }
    .fg.ro input { background: var(--bg4); color: var(--text3); }
    .fgr  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fgr3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .fa   { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.1rem; padding-top: 1rem; border-top: 1px solid var(--border); }

    /* ── MODAL ── */
    .mwrap {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .mwrap.open { display: flex; }
    .modal {
      background: var(--bg2);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border2);
      padding: 1.5rem;
      width: 500px;
      max-width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(30,144,255,.08);
    }
    .mtitle {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text);
    }

    /* ── GRID ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }

    /* ── MONTH NAV ── */
    .mnav { display: flex; align-items: center; gap: 8px; }
    .mlabel2 { font-size: 13px; font-weight: 600; min-width: 130px; text-align: center; color: var(--text); font-family: 'DM Mono', monospace; }

    /* ── BAR ── */
    .bar-track { background: var(--bg4); border-radius: 4px; height: 4px; margin-top: 4px; }
    .bar-fill  { border-radius: 4px; height: 4px; background: var(--blue); transition: width .4s; }

    /* ── PROJECT CARD ── */
    .proj-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.1rem;
      margin-bottom: .75rem;
      transition: border-color .2s;
    }
    .proj-card:hover { border-color: var(--border2); }
    .proj-name { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .proj-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* ── DROP ZONE ── */
    .drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      color: var(--text3);
    }
    .drop-zone:hover, .drop-zone.drag {
      border-color: var(--blue);
      background: var(--blue-dim);
      color: var(--blue);
    }

    /* ── LOGIN ── */
    .login-full {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 2.25rem;
      width: 340px;
      box-shadow: 0 0 60px rgba(30,144,255,.06);
    }
    .login-logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.75rem;
    }
    .login-badge {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--bg4);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      letter-spacing: -2px;
    }

    /* ── TAG ── */
    .tag { padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .tag-admin { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(30,144,255,.2); }
    .tag-user  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.2); }

    .divider { height: 1px; background: var(--border); margin: .85rem 0; }
    .empty { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 13px; }

    /* ── PDF RESULT ── */
    .pdf-result {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 1.1rem;
      margin-top: .9rem;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── RESPONSIVE ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 99;
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.open { display: block; }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 20px;
      padding: 4px;
      margin-right: 4px;
    }

    /* Bottom nav for mobile */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      z-index: 90;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom));
      gap: 0;
      justify-content: space-around;
      align-items: center;
    }
    .bnav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 5px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text3);
      font-size: 9px;
      font-weight: 500;
      transition: color .15s;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      min-width: 52px;
    }
    .bnav-item i { font-size: 20px; }
    .bnav-item.active { color: var(--blue); }
    .bnav-item:hover { color: var(--text); }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform .25s ease;
        z-index: 100;
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .grid2 { grid-template-columns: 1fr; }
      .semaforo { grid-template-columns: 1fr; }
      .fgr { grid-template-columns: 1fr; }
      .fgr3 { grid-template-columns: 1fr; }
      .menu-btn { display: block; }
      .bottom-nav { display: flex; }
      .content { padding: 1rem; padding-bottom: 80px; }
      .topbar { padding: 0 1rem; }
      .modal { width: 100%; max-height: 85vh; }
      .mwrap { align-items: flex-end; padding: 0; }
      .modal { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
      table { font-size: 11px; }
      .metric { padding: .75rem; }
      .mval { font-size: 17px; }
    }

    @media (max-width: 420px) {
      .metrics { grid-template-columns: 1fr 1fr; gap: 6px; }
      .semaforo { grid-template-columns: 1fr; gap: 6px; }
      .bnav-item { min-width: 44px; padding: 5px 6px; }
    }

function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

  S.facturas=ls(KF)||[];S.proyectos=ls(KP)||[];S.contactos=ls(KC)||[];

function renderTopbar(){
  const LABELS={dashboard:'Dashboard',facturas:'Facturas',pdf:'Importar PDF',proyectos:'Proyectos',contactos:'Clientes',anual:'Análisis anual',usuarios:'Usuarios'};
  const addBtn=['dashboard','facturas'].includes(S.tab)?`<button class="btn primary sm" onclick="openModal('factura')"><i class="ti ti-plus"></i> Nueva factura</button>`:'';
  const projBtn=S.tab==='proyectos'?`<button class="btn primary sm" onclick="openModal('proyecto')"><i class="ti ti-plus"></i> Nuevo proyecto</button>`:'';
  const contBtn=S.tab==='contactos'?`<button class="btn primary sm" onclick="openModal('contacto')"><i class="ti ti-plus"></i> Nuevo contacto</button>`:'';
  return`<div class="topbar">
    <button class="menu-btn" onclick="S.sidebarOpen=true;render()"><i class="ti ti-menu-2"></i></button>
    <div class="breadcrumb"><i class="ti ti-home" style="font-size:12px"></i> <i class="ti ti-chevron-right" style="font-size:10px"></i> <span>${LABELS[S.tab]||''}</span></div>
    <span class="page-title" style="margin-left:.5rem">${LABELS[S.tab]||''}</span>
    <div class="topbar-right">${addBtn}${projBtn}${contBtn}</div>
  </div>`;
}

function renderTab(){
  if(S.tab==='dashboard')return renderDash();
  if(S.tab==='facturas')return renderFacturas();
  if(S.tab==='pdf')return renderPDF();
  if(S.tab==='proyectos')return renderProyectos();
  if(S.tab==='contactos')return renderContactos();
  if(S.tab==='anual')return renderAnual();
  if(S.tab==='usuarios')return renderUsuarios();
  return'';
}

function renderDash(){
  const mes=S.facturas.filter(f=>mk(f.fecha)===S.currentMonth);
  const em=mes.filter(f=>f.tipo==='emitida'),rec=mes.filter(f=>f.tipo==='recibida');
  const deb=em.reduce((s,f)=>s+f.iva,0),cred=rec.reduce((s,f)=>s+f.iva,0);
  const saldo=Math.max(0,deb-cred);
  const pend=mes.filter(f=>f.estado==='pendiente'&&!isVenc(f)).length;
  const venc=mes.filter(f=>isVenc(f)).length;
  const cobrado=em.filter(f=>f.estado==='pagada').reduce((s,f)=>s+f.total,0);
  const porCobrar=em.filter(f=>f.estado==='pendiente'&&!isVenc(f)).reduce((s,f)=>s+f.total,0);
  const porPagarProv=rec.filter(f=>f.estado==='pendiente').reduce((s,f)=>s+f.total,0);
  const today=new Date();
  const venc12=new Date(today.getFullYear(),today.getMonth()+1,12);
  const dLeft=Math.ceil((venc12-today)/864e5);
  const esMes=mk(today.toISOString())===S.currentMonth;
  let alertas='';
  if(esMes&&dLeft<=12&&dLeft>0&&saldo>0)alertas+=`<div class="alert warn"><i class="ti ti-alert-triangle"></i> Faltan <b>${dLeft} días</b> para pagar el IVA al SII (día 12) — <b>${fmt(saldo)}</b></div>`;
  if(venc>0)alertas+=`<div class="alert err"><i class="ti ti-clock-exclamation"></i> Tienes <b>${venc} factura(s) vencida(s)</b> sin cobrar este mes.</div>`;
  const total=cobrado+porCobrar;
  const pct=total>0?Math.round(cobrado/total*100):0;
  const semColor=pct>=70?'verde':pct>=40?'amarillo':'rojo';
  const ivaColor=saldo===0?'verde':saldo<deb*0.5?'amarillo':'rojo';
  const vencColor=venc===0?'verde':venc<=2?'amarillo':'rojo';
  const bycat={};em.forEach(f=>{bycat[f.categoria||'Sin cat']=(bycat[f.categoria||'Sin cat']||0)+f.neto;});
  const topcat=Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,4);
  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem">
      <div class="mnav">
        <button class="btn ghost sm" onclick="chMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="mlabel2">${mnName(S.currentMonth)}</span>
        <button class="btn ghost sm" onclick="chMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:11px;color:var(--text3)"><i class="ti ti-clock" style="font-size:12px"></i> IVA vence día 12</div>
        ${Notification&&Notification.permission!=='granted'?`<button class="btn sm" onclick="activarNotificaciones()" style="color:var(--amber);border-color:rgba(245,158,11,.3);background:var(--amber-dim)"><i class="ti ti-bell"></i> Activar alertas</button>`:`<span style="font-size:11px;color:var(--green)"><i class="ti ti-bell-check"></i> Alertas activas</span>`}
      </div>
    </div>
    ${alertas}
    <div class="semaforo">
      <div class="sem">
        <div class="sem-dot ${semColor}"></div>
        <div class="sem-info">
          <div class="sem-label">Cobrado vs emitido</div>
          <div class="sem-val ${semColor}">${pct}%</div>
          <div class="sem-sub">${fmt(cobrado)} de ${fmt(total)}</div>
        </div>
      </div>
      <div class="sem">
        <div class="sem-dot ${ivaColor}"></div>
        <div class="sem-info">
          <div class="sem-label">IVA a pagar SII</div>
          <div class="sem-val ${ivaColor}">${fmt(saldo)}</div>
          <div class="sem-sub">Vence el día 12</div>
        </div>
      </div>
      <div class="sem">
        <div class="sem-dot ${vencColor}"></div>
        <div class="sem-info">
          <div class="sem-label">Facturas vencidas</div>
          <div class="sem-val ${vencColor}">${venc}</div>
          <div class="sem-sub">${pend} pendiente(s)</div>
        </div>
      </div>
    </div>
    <div class="metrics">
      <div class="metric accent-blue">
        <div class="mlabel">Débito fiscal</div>
        <div class="mval blue">${fmt(deb)}</div>
        <div class="msub">${em.length} facturas emitidas</div>
      </div>
      <div class="metric accent-green">
        <div class="mlabel">Crédito fiscal</div>
        <div class="mval green">${fmt(cred)}</div>
        <div class="msub">${rec.length} facturas recibidas</div>
      </div>
      <div class="metric accent-amber">
        <div class="mlabel">Por cobrar</div>
        <div class="mval amber">${fmt(porCobrar)}</div>
        <div class="msub">${pend} pendiente(s)</div>
      </div>
      <div class="metric accent-red">
        <div class="mlabel">Por pagar proveedores</div>
        <div class="mval red">${fmt(porPagarProv)}</div>
        <div class="msub">Cuentas por pagar</div>
      </div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-header"><div class="card-title"><i class="ti ti-list"></i> Últimas facturas del mes</div></div>
        ${miniTable(mes)}
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><i class="ti ti-chart-bar"></i> Ingresos por categoría</div></div>
        ${topcat.length?topcat.map(([cat,neto])=>`
          <div style="margin-bottom:11px">
            <div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:3px">
              <span style="color:var(--text2)">${cat}</span>
              <span style="font-weight:600;color:var(--text);font-family:'DM Mono',monospace">${fmt(neto)}</span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(neto/topcat[0][1]*100)}%"></div></div>
          </div>`).join(''):`<div class="empty">Sin datos este mes</div>`}
      </div>
    </div>`;
}

function miniTable(list){
  const s=[...list].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,8);
  if(!s.length)return'<div class="empty">Sin facturas este mes</div>';
  return`<div class="table-wrap"><table>
    <colgroup><col style="width:90px"><col style="width:auto"><col style="width:85px"><col style="width:72px"></colgroup>

function renderProyectos(){
  if(!S.proyectos.length)return`<div class="empty" style="padding:4rem"><i class="ti ti-briefcase" style="font-size:32px;display:block;margin-bottom:12px;color:var(--text3)"></i>Sin proyectos. Crea el primero con el botón de arriba.</div>`;
  return S.proyectos.map(p=>{

    const gastos=facts.filter(f=>f.tipo==='recibida').reduce((s,f)=>s+f.neto,0);
    const rentab=ingresos-gastos;

function renderAnual(){
  const year=S.currentMonth.slice(0,4);
  const meses=Array.from({length:12},(_,i)=>`${year}-${String(i+1).padStart(2,'0')}`);
  const datos=meses.map(m=>{
    const ms=S.facturas.filter(f=>mk(f.fecha)===m);
    const deb=ms.filter(f=>f.tipo==='emitida').reduce((s,f)=>s+f.iva,0);
    const cred=ms.filter(f=>f.tipo==='recibida').reduce((s,f)=>s+f.iva,0);
    const ing=ms.filter(f=>f.tipo==='emitida').reduce((s,f)=>s+f.neto,0);
    return{m,deb,cred,iva:Math.max(0,deb-cred),ing};
  });
  const catD={};
  S.facturas.filter(f=>f.fecha.startsWith(year)&&f.tipo==='emitida').forEach(f=>{catD[f.categoria||'Sin cat']=(catD[f.categoria||'Sin cat']||0)+f.neto;});
  const tIng=datos.reduce((s,d)=>s+d.ing,0),tIva=datos.reduce((s,d)=>s+d.iva,0),tDeb=datos.reduce((s,d)=>s+d.deb,0),tCred=datos.reduce((s,d)=>s+d.cred,0);
  window.__ad={datos,catD};
  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem">
      <div class="mnav">
        <button class="btn ghost sm" onclick="chYear(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="mlabel2">Año ${year}</span>
        <button class="btn ghost sm" onclick="chYear(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="metrics">
      <div class="metric accent-blue"><div class="mlabel">Ingresos netos año</div><div class="mval">${fmt(tIng)}</div></div>
      <div class="metric accent-blue"><div class="mlabel">Débito fiscal año</div><div class="mval">${fmt(tDeb)}</div></div>
      <div class="metric accent-blue"><div class="mlabel">Crédito fiscal año</div><div class="mval">${fmt(tCred)}</div></div>
      <div class="metric accent-blue"><div class="mlabel">IVA total pagado</div><div class="mval">${fmt(tIva)}</div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-header"><div class="card-title"><i class="ti ti-chart-bar"></i> IVA mensual ${year}</div></div><div style="position:relative;height:210px"><canvas id="ch-iva"></canvas></div></div>
      <div class="card"><div class="card-header"><div class="card-title"><i class="ti ti-chart-donut"></i> Ingresos por categoría</div></div><div style="position:relative;height:210px"><canvas id="ch-cat"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title"><i class="ti ti-table"></i> Detalle mensual ${year}</div></div>
      <table>
        <colgroup><col style="width:13%"><col style="width:20%"><col style="width:16%"><col style="width:16%"><col style="width:19%"><col style="width:16%"></colgroup>
        <thead><tr><th>Mes</th><th>Ingresos netos</th><th>Débito</th><th>Crédito</th><th>IVA a pagar</th><th>Facturas</th></tr></thead>
        <tbody>${datos.map(d=>{
          const nm=new Date(d.m+'-01').toLocaleDateString('es-CL',{month:'short'});
          const cnt=S.facturas.filter(f=>mk(f.fecha)===d.m).length;
          return`<tr>
            <td style="font-weight:600;color:var(--text)">${nm[0].toUpperCase()+nm.slice(1)}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px">${fmt(d.ing)}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px">${fmt(d.deb)}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px">${fmt(d.cred)}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px;font-weight:600">${fmt(d.iva)}</td>
            <td style="color:var(--text2)">${cnt}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

function renderCharts(){

  Chart.defaults.color='#7A80A0';
  Chart.defaults.borderColor='#252730';
  const lbs=ad.datos.map(d=>{const n=new Date(d.m+'-01').toLocaleDateString('es-CL',{month:'short'});return n[0].toUpperCase()+n.slice(1);});
  const c1=document.getElementById('ch-iva');
  if(c1&&!S.charts['iva']){
    S.charts['iva']=new Chart(c1,{type:'bar',data:{labels:lbs,datasets:[
      {label:'Débito',data:ad.datos.map(d=>d.deb),backgroundColor:'rgba(30,144,255,.25)',borderColor:'#1E90FF',borderWidth:1.5,borderRadius:3},
      {label:'Crédito',data:ad.datos.map(d=>d.cred),backgroundColor:'rgba(34,197,94,.2)',borderColor:'#22C55E',borderWidth:1.5,borderRadius:3},
      {label:'IVA neto',data:ad.datos.map(d=>d.iva),backgroundColor:'rgba(239,68,68,.2)',borderColor:'#EF4444',borderWidth:1.5,borderRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:0},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}}}}); 
  }
  const ents=Object.entries(ad.catD);
  const c2=document.getElementById('ch-cat');
  if(c2&&ents.length&&!S.charts['cat']){
    const cols=['#1E90FF','#22C55E','#F59E0B','#EF4444','#A78BFA','#34D399','#FB7185'];
    S.charts['cat']=new Chart(c2,{type:'doughnut',data:{labels:ents.map(e=>e[0]),datasets:[{data:ents.map(e=>e[1]),backgroundColor:cols.map(c=>c+'33'),borderColor:cols,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,color:'#7A80A0'}}}}});
  }
}

function handleDrop(e){e.preventDefault();document.getElementById('dropzone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')handlePDF(f);}
async function handlePDF(file){
  if(!file)return;
  const st=document.getElementById('pdf-status');
  st.innerHTML=`<div class="alert warn" style="margin-top:.85rem"><i class="ti ti-loader"></i> Leyendo factura con IA...</div>`;
  try{
    const ab=await file.arrayBuffer();
    const bytes=new Uint8Array(ab);
    let b64='';
    const chunk=8192;
    for(let i=0;i<bytes.length;i+=chunk){b64+=btoa(String.fromCharCode(...bytes.subarray(i,i+chunk)));}
    st.innerHTML=`<div class="alert warn" style="margin-top:.85rem"><i class="ti ti-loader"></i> Analizando datos con IA...</div>`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
      {type:'text',text:`Eres un extractor de datos de facturas electrónicas chilenas para la empresa "INGENIERIAS ERIC ANTILEF E.I.R.L." (EA Ingenierías), RUT 78.313.658-9.

REGLAS:
- Si EA Ingenierías aparece como EMISOR/vendedor arriba: tipo="emitida", empresa=el CLIENTE (SEÑOR(ES)).
- Si EA Ingenierías aparece como RECEPTOR/comprador: tipo="recibida", empresa=el PROVEEDOR.
- El RUT a registrar es siempre el de la OTRA empresa, nunca el 78.313.658-9.
- Fecha en formato YYYY-MM-DD.
- Montos como números sin puntos (550.000 = 550000).

Responde SOLO JSON sin markdown:
{"empresa":"","rut":"","folio":"","fecha":"YYYY-MM-DD","neto":0,"iva":0,"total":0,"tipo":"emitida","descripcion":""}`}
    ]}]})});
    const data=await resp.json();
    const raw=data.content.map(c=>c.text||'').join('');
    S.pdfData=JSON.parse(raw.replace(/```json|```/g,'').trim());
    st.innerHTML='';render();
  }catch(e){
    console.error(e);
    st.innerHTML=`<div class="alert err" style="margin-top:.85rem"><i class="ti ti-alert-triangle"></i> No se pudieron extraer los datos. Intenta de nuevo o ingresa manualmente.</div>`;
  }
}

// ── NOTIFICACIONES ──
async function requestNotificationPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

async function checkAndScheduleNotifications(reg){
  const granted = await requestNotificationPermission();
  if(!granted) return;
  checkNotificationsNow();
  // Revisar cada vez que la app se enfoca
  document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden) checkNotificationsNow();
  });
}

function checkNotificationsNow(){
  if(Notification.permission !== 'granted') return;
  const today = new Date();
  const mesActual = today.toISOString().slice(0,7);
  const facturasMes = S.facturas.filter(f=>f.fecha && f.fecha.slice(0,7)===mesActual);

  // Alerta IVA: avisar si quedan 7, 3 o 1 día(s)
  const venc12 = new Date(today.getFullYear(), today.getMonth()+1, 12);
  const dLeft = Math.ceil((venc12 - today) / 864e5);
  const em = facturasMes.filter(f=>f.tipo==='emitida');
  const rec = facturasMes.filter(f=>f.tipo==='recibida');
  const deb = em.reduce((s,f)=>s+f.iva,0);
  const cred = rec.reduce((s,f)=>s+f.iva,0);
  const ivaAPagar = Math.max(0, deb-cred);

  const lastIvaNotif = ls('ea_last_iva_notif');
  const todayStr = today.toISOString().slice(0,10);

  if([7,3,1].includes(dLeft) && ivaAPagar > 0 && lastIvaNotif !== todayStr){
    new Notification('⚡ EA Ingenierías — IVA por pagar', {
      body: `Faltan ${dLeft} día${dLeft>1?'s':''} para pagar el IVA al SII.\nMonto: $${Math.round(ivaAPagar).toLocaleString('es-CL')}`,
      icon: 'icon-192.png',
      badge: 'icon-192.png',
      tag: 'iva-alert',
      requireInteraction: true
    });
    lss('ea_last_iva_notif', todayStr);
  }

  // Alerta facturas vencidas
  const vencidas = S.facturas.filter(f=>isVenc(f));
  const lastVencNotif = ls('ea_last_venc_notif');
  if(vencidas.length > 0 && lastVencNotif !== todayStr){
    new Notification('⚠️ EA Ingenierías — Facturas vencidas', {
      body: `Tienes ${vencidas.length} factura${vencidas.length>1?'s':''} vencida${vencidas.length>1?'s':''} sin cobrar.`,
      icon: 'icon-192.png',
      badge: 'icon-192.png',
      tag: 'venc-alert',
      requireInteraction: false
    });
    lss('ea_last_venc_notif', todayStr);
  }
}

// Botón de activar notificaciones en el dashboard
function activarNotificaciones(){
  requestNotificationPermission().then(granted=>{
    if(granted){
      checkNotificationsNow();
      alert('✅ Notificaciones activadas. Te avisaremos antes del vencimiento del IVA y cuando tengas facturas vencidas.');
    } else {
      alert('Para recibir notificaciones, ve a Configuración del navegador y permite notificaciones para este sitio.');
    }
  });
}
